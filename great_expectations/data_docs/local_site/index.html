.cooltip {

.cooltip .top {
  min-width: 200px;
  top: -6px;
  left: 50%;

  padding: 10px 20px;
  color: #FFFFFF;
  background-color: #222222;

}

.cooltip:hover .top {

}

.cooltip .top i {
  position: absolute;
  top: 100%;
  left: 50%;
  margin-left: -12px;
  width: 24px;
  height: 12px;
  overflow: hidden;
}

.cooltip .top i::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  left: 50%;

    function getFormattedDateWithoutTime  (d) {

        month = '' + (d.getMonth() + 1),
        day = '' + d.getDate(),
        year = d.getFullYear();

        if (month.length < 2)
            month = '0' + month;
        if (day.length < 2)
            day = '0' + day;

        return [year, month, day].join('-');
    }

  function formatRuntimeDateForFilter(text, value, field, data){
    const cellValueAsDateObj = new Date(value);
    return text == getFormattedDateWithoutTime(cellValueAsDateObj);
  }
